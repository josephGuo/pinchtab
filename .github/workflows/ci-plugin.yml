name: CI / Plugin

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to check. Defaults to the workflow ref.'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'plugin/**'
      - '.github/workflows/*plugin*'
  pull_request:
    paths:
      - 'plugin/**'
      - '.github/workflows/*plugin*'

permissions:
  contents: read

jobs:
  plugin:
    uses: ./.github/workflows/reusable-plugin.yml
    with:
      ref: ${{ inputs.ref || github.sha }}
